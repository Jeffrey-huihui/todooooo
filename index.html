<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todooooo - 待办事项</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <div class="header-left">
        <h1 class="title">
          <div class="title-icon">
            <img src="static/img/e3ef52dfb1fb4ea48c45b0db462fc6a8.jpeg~tplv-a9rns2rl98-image_raw_b.png" alt="icon">
          </div>
          Todooooo
        </h1>
      </div>
      <div class="header-right">
        <button id="compactBtn" class="btn-icon" title="紧凑视图">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="3" x2="9" y2="21"></line>
            <line x1="15" y1="3" x2="15" y2="21"></line>
          </svg>
        </button>
        <button id="minimizeBtn" class="btn-icon" title="最小化到托盘">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button id="pinBtn" class="btn-icon" title="置顶窗口">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 19l7-7 3 3-7 7-3-3z"/>
            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
            <path d="M2 2l7.586 7.586"/>
            <circle cx="11" cy="11" r="2"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- 添加任务区域 -->
    <div class="add-todo-section" id="addTodoSection">
      <div class="input-group">
        <input
          type="text"
          id="todoInput"
          placeholder="添加新的待办事项..."
          autocomplete="off"
        >
      </div>
      <div class="input-options">
        <div class="option-group">
          <label class="option-label">优先级</label>
          <div class="priority-selector">
            <button type="button" class="priority-btn" data-priority="low">低</button>
            <button type="button" class="priority-btn active" data-priority="medium">中</button>
            <button type="button" class="priority-btn" data-priority="high">高</button>
          </div>
        </div>
        <div class="option-group">
          <label class="option-label">截止</label>
          <input type="datetime-local" id="dueDateInput" class="date-input">
        </div>
        <button id="addBtn" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          添加
        </button>
      </div>
    </div>

    <!-- 统计信息 -->
    <div class="stats" id="statsSection">
      <div class="stat-item">
        <span class="stat-number" id="totalTodos">0</span>
        <span class="stat-label">总计</span>
      </div>
      <div class="stat-item">
        <span class="stat-number" id="completedTodos">0</span>
        <span class="stat-label">已完成</span>
      </div>
      <div class="stat-item">
        <span class="stat-number" id="pendingTodos">0</span>
        <span class="stat-label">待完成</span>
      </div>
    </div>

    <!-- 任务列表 -->
    <div class="todo-list" id="todoList">
      <!-- 任务项会动态添加到这里 -->
    </div>

    <!-- 空状态提示 -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎉</div>
      <div class="empty-text">太棒了！所有任务都完成了</div>
      <div class="empty-subtext">添加一个新任务开始吧</div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
